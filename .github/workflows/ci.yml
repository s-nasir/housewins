name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (frontend)
        run: pnpm --filter housewins-app typecheck

      - name: Type check (workers)
        run: pnpm --filter housewins-workers typecheck

      - name: Unit + component tests (frontend)
        run: pnpm --filter housewins-app test

      - name: Unit tests (workers)
        run: pnpm --filter housewins-workers test

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter housewins-app exec playwright install --with-deps chromium

      - name: Build frontend
        run: pnpm --filter housewins-app build

      - name: Run E2E tests
        run: pnpm --filter housewins-app test:e2e
